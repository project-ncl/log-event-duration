version: 2
updates:
- package-ecosystem: maven
  directory: "/"
  schedule:
    interval: weekly
  cooldown:
    default-days: 7
    exclude:
      - "org.jboss.da:*"
      - "org.jboss.pnc*:*"        # match org.jboss.pnc:xyz and org.jboss.pnc.group:xyz

- package-ecosystem: "github-actions" # Also update Github actions
  directory: "/"
  schedule:
    # Check for updates to GitHub Actions every week
    interval: "weekly"
  cooldown:
    default-days: 7
